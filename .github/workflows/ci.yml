name: Rubocop

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Rubocop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run Rubocop
        run: bundle exec rubocop
  test:
    name: RSpec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run RSpec
        run: bundle exec rspec