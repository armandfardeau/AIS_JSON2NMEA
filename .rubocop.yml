inherit_from: .rubocop_todo.yml

plugins:
  - rubocop-rake
  - rubocop-rspec
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - "vendor/**/*"
    - "coverage/**/*"
    - "tmp/**/*"
    - "*.gemspec"

Style/Documentation:
  Exclude:
    - 'spec/**/*'
    - 'test/**/*'
